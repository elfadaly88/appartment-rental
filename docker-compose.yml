services:
  postgres-db:
    image: postgres:16
    container_name: rentals-postgres
    environment:
      POSTGRES_USER: rentals_user
      POSTGRES_PASSWORD: rentals_password
      POSTGRES_DB: rentalsdb
    ports:
      - "5444:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rentals_user -d rentalsdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend-api:
    build:
      context: . # يشمل مجلدات الـ Api و Application و Domain و Infrastructure
      dockerfile: RentalsPlatform.Api/Dockerfile
    container_name: rentals-backend-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=postgres-db;Port=5444;Database=rentalsdb;Username=rentals_user;Password=rentals_password
    ports:
      - "5000:8080"
    depends_on:
      postgres-db:
        condition: service_healthy
    restart: unless-stopped

  frontend-pwa:
    build:
      # التعديل الأساسي: المسار الآن يشير إلى المجلد الذي يحتوي على package.json
      context: ./RentalsPlatform.UI/rentals-ui
      dockerfile: Dockerfile
    container_name: rentals-frontend-pwa
    environment:
      NODE_ENV: production
      PORT: 4000
      # تم إضافة الرابط الخارجي عشان المتصفح يقدر يكلم الباك إند
      API_URL: http://localhost:5000/api
      # الرابط الداخلي لسيرفر الأنجولار (SSR) عشان يكلم الباك إند جوه الدوكر
      SSR_API_URL: http://backend-api:8080/api
    ports:
      - "4200:4000"
    depends_on:
      - backend-api
    restart: unless-stopped

volumes:
  postgres_data: