<header class="shell__header">
  <nav class="shell__nav">
    <a class="shell__logo" routerLink="/properties">
      <svg class="shell__logo-icon" viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      <span class="shell__logo-text">Luxe Rentals</span>
    </a>

    <ul class="shell__links">
      <li>
        <a
          class="shell__link"
          routerLink="/properties"
          routerLinkActive="shell__link--active"
          [routerLinkActiveOptions]="{ exact: true }"
        >
          {{ 'NAV.PROPERTIES' | translate }}
        </a>
      </li>
    </ul>

    <div class="shell__actions">
      <app-notification-bell />
      @if (authService.isAuthenticated()) {
        <span class="user-name">
          {{ 'NAV.WELCOME' | translate: { name: authService.currentUser()?.fullName } }}
        </span>
        <button class="shell__auth-button" type="button" (click)="authService.logout()">
          {{ 'NAV.LOGOUT' | translate }}
        </button>
      } @else {
        <a class="shell__auth-link" routerLink="/auth">
          {{ 'NAV.LOGIN' | translate }}
        </a>
      }

      <button
        class="shell__lang-toggle"
        type="button"
        (click)="lang.toggleLanguage()"
        [attr.aria-label]="'NAV.TOGGLE_LANG_LABEL' | translate"
      >
        <svg class="shell__lang-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="10"/>
          <line x1="2" y1="12" x2="22" y2="12"/>
          <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
        </svg>
        {{ toggleLabel() }}
      </button>
    </div>
  </nav>
</header>

<main class="shell__main">
  <router-outlet />
</main>
