<div class="notify">
  <button
    type="button"
    class="notify__bell"
    (click)="togglePopover()"
    [@bellShake]="bellState()"
    [attr.aria-label]="t('الاشعارات', 'Notifications')"
    [attr.aria-expanded]="isOpen()"
  >
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9" />
      <path d="M13.73 21a2 2 0 0 1-3.46 0" />
    </svg>

    @if (unreadCount() > 0) {
      <span class="notify__badge">{{ unreadCount() > 99 ? '99+' : unreadCount() }}</span>
    }
  </button>

  @if (isOpen()) {
    <section class="notify__panel" role="dialog" [attr.aria-label]="t('قائمة الاشعارات', 'Notifications list')">
      <header class="notify__header">
        <h3>{{ t('الاشعارات', 'Notifications') }}</h3>
        @if (unreadCount() > 0) {
          <span class="notify__counter">{{ unreadCount() }} {{ t('غير مقروء', 'unread') }}</span>
        }
      </header>

      <ul class="notify__list">
        @for (item of notifications(); track trackById($index, item)) {
          <li>
            <button
              type="button"
              class="notify__item"
              (click)="onNotificationClick(item)"
            >
              <div class="notify__item-main">
                <p class="notify__title">{{ item.title }}</p>
                <p class="notify__time">{{ relativeTime(item.createdAt) }}</p>
              </div>

              @if (!item.isRead) {
                <button
                  type="button"
                  class="p-2 rounded-full hover:bg-slate-200/50 text-teal-600 transition-colors focus:outline-none focus:ring-2 focus:ring-teal-500"
                  (click)="markAsRead(item.id, $event)"
                  [title]="t('تحديد كمقروء', 'Mark as read')"
                  aria-label="Mark as read"
                >
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" /></svg>
                </button>
              }
            </button>
          </li>
        } @empty {
          <li class="notify__empty">{{ t('لا توجد اشعارات حاليا', 'No notifications yet') }}</li>
        }
      </ul>

      <footer class="notify__footer">
        <button
          type="button"
          class="notify__mark-all"
          [disabled]="unreadCount() === 0"
          (click)="markAllAsRead()"
        >
          {{ t('تحديد الكل كمقروء', 'Mark all as read') }}
        </button>

      </footer>
    </section>
  }
</div>
