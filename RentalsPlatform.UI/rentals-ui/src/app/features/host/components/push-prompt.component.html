@if (isVisible()) {
  <aside class="push-prompt" role="region" [attr.aria-label]="t('تنبيه الاشعارات', 'Notifications prompt')">
    <div class="push-prompt__icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9" />
        <path d="M13.73 21a2 2 0 0 1-3.46 0" />
      </svg>
    </div>

    <div class="push-prompt__content">
      <h3>{{ t('تنبيهات فورية للحجوزات', 'Instant Booking Alerts') }}</h3>
      <p>{{ subtitle() }}</p>

      @if (pushService.error(); as error) {
        <p class="push-prompt__error">{{ error }}</p>
      }
    </div>

    <div class="push-prompt__actions">
      <button
        type="button"
        class="push-prompt__btn push-prompt__btn--primary"
        [disabled]="pushService.isBusy()"
        (click)="turnOn()"
      >
        {{ pushService.isBusy() ? t('جاري التفعيل...', 'Enabling...') : t('تفعيل', 'Turn On') }}
      </button>
      <button
        type="button"
        class="push-prompt__btn push-prompt__btn--secondary"
        [disabled]="pushService.isBusy()"
        (click)="notNow()"
      >
        {{ t('ليس الان', 'Not Now') }}
      </button>
    </div>
  </aside>
}
