# =============================================================================
# Nginx Reverse Proxy – Rentals Platform
# =============================================================================
# HTTP (port 80) – serves app directly or redirects to HTTPS after SSL setup.
# After obtaining SSL certificates with Certbot, uncomment the HTTPS server
# block below and change the HTTP block to a redirect.
# =============================================================================

# ---- Frontend ---------------------------------------------------------------
server {
    listen 80;
    server_name YOUR_DOMAIN_OR_IP;   # <-- replace with your domain or VPS IP

    # Increase timeouts for SSR responses
    proxy_read_timeout 120s;
    proxy_connect_timeout 10s;

    # Pass real client IP to the app
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Frontend (Angular SSR)
    location / {
        proxy_pass http://frontend-pwa:4000;
    }

    # Health check endpoint (optional)
    location /healthz {
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}

# ---- Backend API ------------------------------------------------------------
# NOTE: This server block requires a proper subdomain (e.g. api.example.com).
#       If you only have an IP address (no domain), remove this block and
#       instead proxy /api and /hubs paths inside the frontend server block
#       above (see the IP-only example in DEPLOYMENT.md).
server {
    listen 80;
    server_name api.YOUR_DOMAIN;   # <-- replace with subdomain, e.g. api.example.com

    proxy_read_timeout 120s;
    proxy_connect_timeout 10s;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # WebSocket support for SignalR hubs
    proxy_http_version 1.1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection "upgrade";

    location / {
        proxy_pass http://backend-api:8080;
    }
}

